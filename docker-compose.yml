version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: evolution_postgres_cedom
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=senha_super_secreta_cedom_2026
      - POSTGRES_DB=evolution_db
    volumes:
      - ./evolution_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution_api_cedom
    restart: always
    ports:
      - "8090:8080"
    environment:
      - SERVER_URL=http://localhost:8090
      - AUTHENTICATION_API_KEY=d
      - DONT_SHOW_DASHBOARD=false
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:cedom_secreta_2026@postgres:5432/evolution_db?schema=public
      - WEBHOOK_GLOBAL_ENABLED=false
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true
      - INTEGRATION_WHATSAPP_BAILEYS=true
      - BAILEYS_SYNC_FULL_HISTORY=true
      - CONFIG_SESSION_PHONE_VERSION=2,3000,1025062854
    volumes:
      - ./evolution_instances:/evolution/instances
      - ./evolution_store:/evolution/store
    depends_on:
      postgres:
        condition: service_healthy
